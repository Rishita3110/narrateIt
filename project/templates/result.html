<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Story Analysis Result</title>
<style>
body { font-family: Arial; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:white; padding:30px; border-radius:10px; width:400px; box-shadow:0 0 10px rgba(0,0,0,0.2); }
h2 { text-align:center; }
p { margin:10px 0; }
a { display:block; margin-top:15px; text-align:center; text-decoration:none; color:#007BFF; }
</style>
</head>
<body>
<div class="container">
<h2>Story Analysis Result</h2>
<p><strong>Story:</strong> {{ story }}</p>
<p><strong>Sentiment:</strong> {{ sentiment }}</p>
<p><strong>Positive Score:</strong> {{ positive }}</p>
<p><strong>Negative Score:</strong> {{ negative }}</p>
<p><strong>Neutral Score:</strong> {{ neutral }}</p>
<a href="/textbox">Submit Another Story</a>
</div>
</body>
</html>
